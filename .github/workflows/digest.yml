name: digest

# One morning briefing of the day's board. Reads the state committed by the
# hourly `alerts` run; sends a single push, or stays silent if nothing qualifies.
on:
  schedule:
    - cron: "10 13 * * *" # 13:10 UTC ≈ 06:10 PDT / 05:10 PST
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - name: Send daily digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          RWA_ROOT: ${{ github.workspace }}
        run: rare-weather digest
