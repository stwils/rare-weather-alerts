name: alerts

on:
  schedule:
    - cron: "8 * * * *" # hourly; GitHub may delay runs by a few minutes
  workflow_dispatch:

permissions:
  contents: write # commit state/state.json back
  pages: write # publish the dashboard
  id-token: write # required by deploy-pages

concurrency:
  group: alerts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - name: Run alert pass (fetch, score, rebuild dashboard, push Exceptional)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          RWA_ROOT: ${{ github.workspace }}
        run: rare-weather run
      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state/state.json)" ]; then
            git config user.name "rare-weather-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state/state.json
            git commit -m "chore: update opportunity state"
            git push
          fi
      # Pages steps are non-fatal until Pages is enabled (Source: GitHub Actions);
      # the alert push + state commit above have already happened.
      - uses: actions/configure-pages@v5
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: site
      - id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
