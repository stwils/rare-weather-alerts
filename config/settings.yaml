# Rare Weather Alerts — settings
home_base:
  name: Portland, OR
  latitude: 45.5152
  longitude: -122.6784
travel_radius_drive_hours: 2.5
timezone: America/Los_Angeles

# Rarity tiers: percentile of the daily-max Quality Score distribution at a
# (Spot, Phenomenon). Floors prevent junk alerts at spots where a phenomenon
# almost never occurs (there, the p98 of daily scores can be near zero).
tiers:
  notable:
    percentile: 0.98
    floor: 0.25
  exceptional:
    percentile: 0.995
    floor: 0.35

# Opportunity lifecycle
merge_gap_hours: 6        # below-threshold gaps shorter than this don't split an Opportunity
coalesce_gap_hours: 12    # same-phenomenon alerts whose windows are this close go out as one push
forecast_days: 3

# Delivery. Secrets come from environment variables:
#   NTFY_TOPIC, PUSHOVER_TOKEN, PUSHOVER_USER
notify:
  ntfy_url: https://ntfy.sh

paths:
  state: state/state.json
  thresholds: data/thresholds.json
  daily_scores: data/daily_scores.json
  raw_cache: data/raw
  greatest_hits: data/greatest_hits.md
  site: site        # generated dashboard, published to GitHub Pages

backfill:
  era5_start: "2016-07-01"          # 10 years for fog + sunrise/sunset
  forecast_archive_start: "2021-04-01"  # earliest with CAPE + 700hPa (storm light, lenticular)
